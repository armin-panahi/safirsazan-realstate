<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشاور املاک | خانه ایده‌آل</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">

      <div class="logo">خانه ایده‌آل</div>

      <nav class="nav">
        <a href="#">خانه</a>
        <a href="#">خدمات</a>
        <a href="#">املاک</a>
        <a href="#">درباره ما</a>
        <a href="#">تماس</a>
      </nav>

      <a class="btn-primary" href="#">تماس با مشاور</a>

    </div>
  </header>

  <!-- Hero -->
  <section class="hero">

    <div class="container hero-inner">

      <!-- Left -->
      <div class="hero-text">
        <span class="badge">مشاور املاک حرفه‌ای</span>

        <h1>
          خانه‌ای که<br>
          لایق شماست
        </h1>

        <p>
          خرید، فروش، رهن و اجاره انواع املاک با مشاوره تخصصی و همراهی تا پایان معامله.
        </p>

        <div class="hero-actions">
          <a class="btn-primary" href="#">مشاهده املاک</a>
          <a class="btn-secondary" href="#">تماس</a>
        </div>

        <div class="stats">
          <div>500+<span>معامله</span></div>
          <div>200+<span>مشتری</span></div>
          <div>10+<span>سال تجربه</span></div>
          <div>24/7<span>پشتیبانی</span></div>
        </div>
      </div>

      <!-- Right -->
      <div class="hero-image">
        <img src="assets/images/house.jpg" alt="luxury house">

        <div class="floating-card">
          <h4>ویلای مدرن</h4>
          <p>280 متر | 3 خواب</p>
          <strong>15 میلیارد تومان</strong>
        </div>

      </div>

    </div>

  </section>

</body>
</html>
